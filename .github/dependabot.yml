version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      dependencies:
        update-types:
          - "patch"
          - "minor"
