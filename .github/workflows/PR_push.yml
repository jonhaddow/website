name: PR build
on: pull_request

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run prettier
